<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="profile.title">Laoverse</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/shared-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="api.js"></script>
  <script src="theme.js"></script>
    <script src="language.js"></script>
    <script src="confirm.js"></script>
    <script src="nav-badges.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="logo.png" alt="Logo"><br>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" data-i18n="nav.home" data-tooltip="Home"><svg class="nav-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a></li>
                <li><a href="profile.html" class="active" data-i18n="nav.profile" data-tooltip="Profile"><svg class="nav-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a></li>
                <li><a href="friends.html" data-i18n="nav.friends" data-tooltip="Friends"><svg class="nav-icon"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></a></li>
                <li><a href="note.html" data-i18n="nav.note" data-tooltip="Notifications"><svg class="nav-icon"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></a></li>
                <li><a href="message.html" data-i18n="nav.message" data-tooltip="Messages"><svg class="nav-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></a></li>
                <li><a href="settings.html" data-i18n="nav.settings" data-tooltip="Settings"><svg class="nav-icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a></li>
            </ul>
        </nav>
    </header>
    <div id="message" class="message"></div>
    <div class="profile-container">
        <img id="profilePic" src="default-profile.png" alt="ຮູບໂປຣໄຟລ໌">
        <div class="profile-info">
            <h2 id="profileUsername"></h2>
            <p><span data-i18n="profile.posts">ໂພສ</span>: <span id="postCount">0</span></p>
            <p><span data-i18n="profile.friends">ໝູ່ເພື່ອນ</span>: <span id="friendCount">0</span></p>
        </div>
        <button id="friendBtn" style="display: none;" data-i18n="profile.sendRequest">ສົ່ງຄຳຂໍເປັນໝູ່</button>
        <button id="editProfileBtn" data-i18n="profile.edit">ແກ້ໄຂໂປຣໄຟລ໌</button>
    </div>
    <div id="profilePosts">
        <h2 data-i18n="profile.posts">ໂພສ</h2>
    </div>
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeEditModal()">&times;</span>
            <h2 data-i18n="profile.editTitle">ແກ້ໄຂໂປຣໄຟລ໌</h2>
            <form id="editProfileForm">
                <div>
                    <label for="editUsername" data-i18n="profile.username">ຊື່ຜູ້ໃຊ້:</label>
                    <input type="text" id="editUsername" name="username">
                </div>
                <div>
                    <label for="editProfilePic" class="file-input-label">
                        <span data-i18n="profile.newPhoto">ຮູບໂປຣໄຟລ໌ໃໝ່</span>
                        <span id="fileInputName" class="file-input-name"></span>
                    </label>
                    <input type="file" id="editProfilePic" name="profile_pic" accept="image/*">
                </div>
                <button type="submit" data-i18n="profile.saveChanges">ບັນທຶກການປ່ຽນແປງ</button>
                <button type="button" class="cancel-button" onclick="closeEditModal()" data-i18n="common.cancel">ຍົກເລີກ</button>
            </form>
        </div>
    </div>
    <div id="editPostModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeEditPostModal()">&times;</span>
            <h2 data-i18n="common.editPost">ແກ້ໄຂໂພສ</h2>
            <form id="editPostForm">
                <div>
                    <label for="editPostContent" data-i18n="common.content">ເນື້อຫາ:</label>
                    <textarea id="editPostContent" name="content" rows="4" maxlength="1000"></textarea>
                </div>
                <div>
                    <label for="editPostImage" class="file-input-label">
                        <span data-i18n="common.image">ຮູບພາບ</span>
                        <span id="editPostImageName" class="file-input-name"></span>
                    </label>
                    <input type="file" id="editPostImage" name="image" accept="image/*,video/*,audio/*">
                </div>
                <button type="submit" data-i18n="common.save">ບັນທຶກ</button>
                <button type="button" class="cancel-button" onclick="closeEditPostModal()" data-i18n="common.cancel">ຍົກເລີກ</button>
            </form>
        </div>
    </div>
    <script src="profile.js"></script>
</body>
</html>
