<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="common.pageNotFound">404 - Page Not Found</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="css/shared-styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .error-container {
            max-width: 500px;
            padding: 3rem;
            background: var(--gray);
            border: 1px solid var(--neon-blue);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(102, 240, 255, 0.2);
        }
        h1 { font-size: 5rem; color: var(--neon-blue); margin-bottom: 1rem; }
        p { font-size: 1.2rem; margin-bottom: 2rem; }
        .back-home {
            display: inline-block;
            padding: 12px 24px;
            background: var(--neon-blue);
            color: var(--black);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .back-home:hover {
            box-shadow: 0 0 20px var(--neon-blue);
            transform: translateY(-2px);
        }
    </style>
    <script src="api.js"></script>
    <script src="theme.js"></script>
    <script src="language.js"></script>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2 data-i18n="common.pageNotFound">Page Not Found</h2>
        <p data-i18n="common.pageNotFoundDesc">The page you are looking for does not exist or has been moved.</p>
        <a href="index.html" class="back-home" data-i18n="common.backHome">Back to Home</a>
    </div>
</body>
</html>
