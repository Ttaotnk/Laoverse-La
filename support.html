<!DOCTYPE html>
<html lang="lo">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="support.pageTitle">Laoverse</title>
  <link rel="icon" href="/logo.png" type="image/png">
  <link rel="stylesheet" href="css/settings.css" />
  <link rel="stylesheet" href="css/shared-styles.css" />
  <script src="api.js"></script>
  <script src="theme.js"></script>
  <script src="language.js"></script>
  <script src="nav-badges.js"></script>
</head>

<body>
  <header class="main-header">
    <div class="logo"><img src="logo.png" alt="Logo" /></div>
    <nav class="main-nav">
      <ul>
        <li><a href="settings.html" data-i18n="nav.backSettings" data-tooltip="Back to Settings"><svg class="nav-icon"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a></li>
      </ul>
    </nav>
  </header>
  <main class="settings-container">
    <section class="card">
      <h2 data-i18n="support.contactTitle">ຂໍ້ມູນຕິດຕໍ່</h2>
      <div class="contact-list">
        <a class="contact-item" href="https://www.facebook.com/tnk.taonakha" target="_blank" rel="noopener">
          <span class="contact-label" data-i18n="support.facebook">Facebook</span>
          <span class="contact-value">facebook.com/tnk.taonakha</span>
        </a>
        <a class="contact-item" href="mailto:taonakha2018@gmail.com">
          <span class="contact-label" data-i18n="support.gmail">Gmail</span>
          <span class="contact-value">taonakha2018@gmail.com</span>
        </a>
        <a class="contact-item" href="tel:+8562091455329">
          <span class="contact-label" data-i18n="support.tel">Tel</span>
          <span class="contact-value">+8562091455329</span>
        </a>
        <a class="contact-item" href="https://wa.me/+8562091497915" target="_blank" rel="noopener">
          <span class="contact-label" data-i18n="support.whatsapp">WhatsApp</span>
          <span class="contact-value">+8562091497915</span>
        </a>
      </div>
    </section>
    <section class="card">
      <h1 data-i18n="support.title">ຕິດຕໍ່ຝ່າຍຊ່ວຍເຫຼືອ</h1>
      <div style="margin-bottom: 15px; text-align: left;">
        <label for="supportEmail" style="display: block; margin-bottom: 5px; font-weight: 500;"
          data-i18n="support.emailLabel">ອີເມວທີ່ໃຊ້ຕິດຕໍ່ກັບ</label>
        <input id="supportEmail" type="email" readonly placeholder="Loading email..."
          style="opacity: 0.7; cursor: not-allowed; margin-bottom: 0;" />
      </div>
      <input id="supportTitle" type="text" data-i18n-placeholder="support.subject" placeholder="ຫົວຂໍ້ບັນຫາ" />
      <textarea id="supportMessage" rows="6" data-i18n-placeholder="support.message"
        placeholder="ລາຍລະອຽດບັນຫາ"></textarea>
      <button id="sendSupportBtn" data-i18n="support.send">ສົ່ງຄຳຮ້ອງຂໍ</button>
      <div id="message" class="message"></div>
    </section>
  </main>
  <script src="support.js"></script>
</body>

</html>
