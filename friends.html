<!DOCTYPE html>
<html lang="lo">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="friends.title">Laoverse</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="stylesheet" href="css/friends.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="api.js"></script>
    <script src="theme.js"></script>
    <script src="language.js"></script>
    <script src="confirm.js"></script>
    <script src="nav-badges.js"></script>
</head>

<body>
    <header class="main-header">
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" data-i18n="nav.home">ໜ້າຫຼັກ</a></li>
                <li><a href="profile.html" data-i18n="nav.profile">ໂປຣໄຟລ໌</a></li>
                <li><a href="friends.html" class="active" data-i18n="nav.friends">ໝູ່ເພື່ອນ</a></li>
                <li><a href="note.html" data-i18n="nav.note">ແຈ້ງເຕືອນ</a></li>
                <li><a href="message.html" data-i18n="nav.message">ຂໍ້ຄວາມ</a></li>
                <li><a href="settings.html" data-i18n="nav.settings">ຕັ້ງຄ່າ</a></li>
            </ul>
        </nav>
    </header>
    <div id="message" class="message"></div>
    <div id="search-container">
        <input type="text" id="searchFriends" data-i18n-placeholder="friends.searchPlaceholder"
            placeholder="ຄົ້ນຫາໝູ່ເພື່ອນ...">
        <div id="searchResults"></div>
    </div>
    <div id="friendRequests">
        <h2 data-i18n="friends.requests">ຄຳຂໍເປັນໝູ່</h2>
        <div id="friendRequestsList"></div>
    </div>
    <div id="friends">
        <h2 data-i18n="friends.myFriends">ໝູ່ເພື່ອນຂອງຂ້ອຍ</h2>
        <div id="friendsList"></div>
    </div>
    <script src="friends.js"></script>
</body>

</html>
