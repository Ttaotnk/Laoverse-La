<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="messages.title">Laoverse</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="stylesheet" href="css/message.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="api.js"></script>
  <script src="theme.js"></script>
    <script src="language.js"></script>
    <script src="confirm.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="logo.png" alt="Logo"><br>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" data-i18n="nav.home">ໜ້າຫຼັກ</a></li>
                <li><a href="profile.html" data-i18n="nav.profile">ໂປຣໄຟລ໌</a></li>
                <li><a href="friends.html" data-i18n="nav.friends">ໝູ່ເພື່ອນ</a></li>
                <li><a href="note.html" data-i18n="nav.note">ແຈ້ງເຕືອນ</a></li>
                <li><a href="message.html" class="active" data-i18n="nav.message">ຂໍ້ຄວາມ</a></li>
                <li><a href="settings.html" data-i18n="nav.settings">ຕັ້ງຄ່າ</a></li>
            </ul>
        </nav>
    </header>
    <div class="content-container">
        <div class="friends-container">
            <div class="friends-header" data-i18n="messages.friendsHeader">ລາຍຊື່ໝູ່ເພື່ອນ</div>
            <div id="friends-list">
                <div class="loading" data-i18n="messages.loadingFriends">ກຳລັງໂຫຼດລາຍຊື່ໝູ່ເພື່ອນ...</div>
            </div>
        </div>
        <div class="chat-container">
            <div class="chat-header">
                <span id="chat-header-name"></span>
            </div>
            <div id="chat-messages">
                <div class="loading" id="chat-empty-state" data-i18n="messages.emptyChat">ເລືອກໝູ່ເພື່ອເລີ່ມແຊັດ</div>
            </div>
            <div class="input-container">
                <button class="action-button" id="file-button" data-i18n-title="messages.attachFile" title="ແນບໄຟລ໌">📎</button>
                <input type="file" id="file-input" accept="*/*">
                <textarea id="message-input" data-i18n-placeholder="messages.inputPlaceholder" placeholder="ພິມຂໍ້ຄວາມ..." rows="1"></textarea>
                <button class="action-button" id="send-button" data-i18n="messages.send" data-i18n-title="messages.send" title="ສົ່ງຂໍ້ຄວາມ">ສົ່ງ</button>
            </div>
        </div>
    </div>
    <script src="messages.js"></script>
</body>
</html>
