<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="messages.title">Laoverse</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="stylesheet" href="css/message.css">
    <link rel="stylesheet" href="css/shared-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="api.js"></script>
    <script src="theme.js"></script>
    <script src="language.js"></script>
    <script src="confirm.js"></script>
    <script src="nav-badges.js"></script>
</head>
<body class="whatsapp-mode">
    <header class="main-header">
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" data-i18n="nav.home" data-tooltip="Home"><svg class="nav-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a></li>
                <li><a href="profile.html" data-i18n="nav.profile" data-tooltip="Profile"><svg class="nav-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a></li>
                <li><a href="friends.html" data-i18n="nav.friends" data-tooltip="Friends"><svg class="nav-icon"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></a></li>
                <li><a href="note.html" data-i18n="nav.note" data-tooltip="Notifications"><svg class="nav-icon"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></a></li>
                <li><a href="message.html" class="active" data-i18n="nav.message" data-tooltip="Messages"><svg class="nav-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></a></li>
                <li><a href="settings.html" data-i18n="nav.settings" data-tooltip="Settings"><svg class="nav-icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a></li>
            </ul>
        </nav>
    </header>

    <div class="app-container">
        <!-- Friends List View -->
        <div id="friends-view" class="view active">
            <div class="view-header">
                <h2 data-i18n="messages.title">ຂໍ້ຄວາມ</h2>
                <div class="header-actions">
                     <label class="online-toggle-label">
                        <span data-i18n="settings.onlineStatus" style="font-size: 0.8rem; font-weight: 500;">ສະຖານະອອນລາຍ</span>
                        <input type="checkbox" id="online-status-toggle" checked>
                        <span class="slider"></span>
                     </label>
                </div>
            </div>
            <div id="friends-list" class="scroll-area">
                <div class="loading" data-i18n="messages.loadingFriends">ກຳລັງໂຫຼດລາຍຊື່ໝູ່ເພື່ອນ...</div>
            </div>
        </div>

        <!-- Chat Room View -->
        <div id="chat-view" class="view">
            <div class="chat-header-wa">
                <button id="back-button" class="back-btn">
                    <span class="back-icon">←</span>
                </button>
                <div class="chat-user-info" onclick="goToFriendProfile()">
                    <div class="avatar-wrapper">
                        <img id="chat-avatar" src="default-profile.png" alt="avatar">
                        <span id="chat-online-dot" class="online-dot"></span>
                    </div>
                    <div class="user-detail">
                        <span id="chat-header-name" class="user-name"></span>
                        <span id="chat-status-text" class="status-text"></span>
                    </div>
                </div>
            </div>
            
            <div id="chat-messages" class="scroll-area chat-bg">
                <div id="chat-empty-state" class="empty-chat-msg" data-i18n="messages.emptyChat">ເລືອກໝູ່ເພື່ອເລີ່ມແຊັດ</div>
            </div>

            <div class="input-area-wa">
                <button class="wa-action-btn" id="file-button">📎</button>
                <input type="file" id="file-input" style="display:none;">
                <div class="input-wrapper">
                    <textarea id="message-input" data-i18n-placeholder="messages.inputPlaceholder" placeholder="ພິມຂໍ້ຄວາມ..." rows="1"></textarea>
                </div>
                <button class="wa-send-btn" id="send-button">➤</button>
            </div>
        </div>
    </div>

    <script src="messages.js"></script>
</body>
</html>
