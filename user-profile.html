<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="profile.userTitle">Laoverse</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="stylesheet" href="css/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="api.js"></script>
  <script src="theme.js"></script>
    <script src="language.js"></script>
    <script src="confirm.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="logo.png" alt="Logo"><br>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" data-i18n="nav.home">ໜ້າຫຼັກ</a></li>
                <li><a href="profile.html" data-i18n="nav.profile">ໂປຣໄຟລ໌</a></li>
                <li><a href="friends.html" data-i18n="nav.friends">ໝູ່ເພື່ອນ</a></li>
                <li><a href="note.html" data-i18n="nav.note">ແຈ້ງເຕືອນ</a></li>
                <li><a href="message.html" data-i18n="nav.message">ຂໍ້ຄວາມ</a></li>
                <li><a href="settings.html" data-i18n="nav.settings">ຕັ້ງຄ່າ</a></li>
            </ul>
        </nav>
    </header>
    <div id="message" class="message"></div>
    <div class="profile-container">
        <img id="profilePic" src="default-profile.png" alt="ຮູບໂປຣໄຟລ໌">
        <div class="profile-info">
            <h2 id="profileUsername"></h2>
            <p><span data-i18n="profile.posts">ໂພສ</span>: <span id="postCount">0</span></p>
            <p><span data-i18n="profile.friends">ໝູ່ເພື່ອນ</span>: <span id="friendCount">0</span></p>
        </div>
        <button id="friendBtn" style="display: none;" data-i18n="profile.sendRequest">ສົ່ງຄຳຂໍເປັນໝູ່</button>
    </div>
    <div id="profilePosts">
        <h2 data-i18n="profile.posts">ໂພສ</h2>
    </div>
    <script src="profile.js"></script>
    <script>
        (function redirectToOwnProfileIfNeeded() {
            try {
                const params = new URLSearchParams(window.location.search || "");
                const viewedId = params.get("id");
                if (!viewedId) return;
                fetch("/api/check-auth", { credentials: "include" })
                    .then((r) => r.json())
                    .then((data) => {
                        const myId = data && data.user ? String(data.user.id || "") : "";
                        if (myId && myId === String(viewedId)) {
                            window.location.replace("profile.html");
                        }
                    })
                    .catch(() => {});
            } catch (e) {}
        })();
    </script>
</body>
</html>
