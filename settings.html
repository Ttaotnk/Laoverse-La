<!DOCTYPE html>
<html lang="lo">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="settings.title">Laoverse</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/shared-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="api.js"></script>
    <script src="theme.js"></script>
    <script src="language.js"></script>
    <script src="confirm.js"></script>
    <script src="nav-badges.js"></script>
</head>

<body>
    <header class="main-header">
        <div class="logo"> <img src="logo.png" alt="Logo"><br> </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" data-i18n="nav.home" data-tooltip="Home"><svg class="nav-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a></li>
                <li><a href="profile.html" data-i18n="nav.profile" data-tooltip="Profile"><svg class="nav-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a></li>
                <li><a href="friends.html" data-i18n="nav.friends" data-tooltip="Friends"><svg class="nav-icon"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></a></li>
                <li><a href="note.html" data-i18n="nav.note" data-tooltip="Notifications"><svg class="nav-icon"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></a></li>
                <li><a href="message.html" data-i18n="nav.message" data-tooltip="Messages"><svg class="nav-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></a></li>
                <li><a href="settings.html" class="active" data-i18n="nav.settings" data-tooltip="Settings"><svg class="nav-icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a></li>
            </ul>
        </nav>
    </header>
    <main class="settings-container">
        <h1 id="titleText" data-i18n="settings.title">ຕັ້ງຄ່າ</h1>
        <section class="card">
            <h2 id="langTitle" data-i18n="settings.language">ພາສາ</h2> <select id="languageSelect">
                <option value="lo">ລາວ</option>
                <option value="th">ไทย</option>
                <option value="en">English</option>
            </select>
        </section>
        <section class="card">
            <h2 data-i18n="settings.theme">ປ່ຽນຮູບແບບສີ (Theme)</h2> <select id="themeSelect">
                <option value="default" data-i18n="settings.theme.default">Theme ເດີມ</option>
                <option value="green" data-i18n="settings.theme.green">Theme ສີຂຽວ</option>
                <option value="pink" data-i18n="settings.theme.pink">Theme ສີຊົມພູ</option>
                <option value="light" data-i18n="settings.theme.light">Theme ສະຫວ່າງ</option>
            </select>
        </section>
        <section class="card">
            <h2 data-i18n="settings.personal">ຂໍ້ມູນສ່ວນຕົວ</h2> <input id="usernameInput" type="text"
                placeholder="Username"> <input id="emailInput" type="email" placeholder="Email"> <button
                id="saveProfileBtn" data-i18n="settings.saveProfile">ບັນທຶກຂໍ້ມູນ</button>
        </section>
        <section class="card">
            <h2 data-i18n="settings.password">ປ່ຽນລະຫັດຜ່ານ</h2> <input id="newPassword" type="password"
                data-i18n-placeholder="settings.newPassword" placeholder="New password"> <input id="confirmPassword"
                type="password" data-i18n-placeholder="settings.confirmPassword" placeholder="Confirm new password">
            <p class="hint" data-i18n="settings.passwordHint">ລະຫັດຕ້ອງ >= 8 ຕົວ, ມີ A-Z, a-z, 0-9, ແລະສັນຍາລັກ</p>
            <button id="changePasswordBtn" data-i18n="settings.changePassword">ປ່ຽນລະຫັດຜ່ານ</button>
        </section>
        <section class="card">
            <h2 data-i18n="settings.support">ຊ່ອງທາງຕິດຕໍ່ຊ່ວຍເຫຼືອ</h2> <button id="supportBtn"
                data-i18n="settings.goSupport">ໄປໜ້າຕິດຕໍ່ຜູ້ດູແລເວັບ</button>
        </section>
        <section class="card danger">
            <h2 data-i18n="settings.account">ບັນຊີ</h2> <button id="logoutBtn"
                data-i18n="settings.logout">Logout</button> <button id="deleteAccountBtn" class="danger-btn"
                data-i18n="settings.deleteAccount">Delete User Account</button>
        </section>
        <div id="message" class="message"></div>
    </main>
    <script src="settings.js"></script>
</body>

</html>
